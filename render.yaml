services:
  - type: web
    name: edpulse-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        fromService:
          name: edpulse-frontend
          type: web
          property: host
    healthCheckPath: /products

  - type: web
    name: edpulse-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: edpulse-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
